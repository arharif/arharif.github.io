<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; color: #ebe9ff; background: radial-gradient(circle at 20% 20%, #3b1d68, transparent 40%), radial-gradient(circle at 80% 15%, #0ea5e9, transparent 35%), #090b12; min-height: 100vh; display: grid; place-items: center; }
      .card { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2); backdrop-filter: blur(10px); padding: 2rem; border-radius: 18px; text-align: center; max-width: 560px; }
      a { color: #a78bfa; text-decoration: none; }
    </style>
    <script>
      (function () {
        var segmentCount = 0;
        var l = window.location;
        var repoRoot = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
        var redirect = repoRoot + '/?/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/') + (l.search ? '&' + l.search.slice(1) : '') + l.hash;
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body>
    <div class="card">
      <p>404</p>
      <h1>Page not found</h1>
      <p>Redirecting you to the main app entry so client-side routing can recover this URL.</p>
      <p><a href="/">Go home now</a></p>
    </div>
  </body>
</html>
