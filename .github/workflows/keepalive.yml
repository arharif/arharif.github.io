name: keepalive

on:
  schedule:
    - cron: "0 3 */5 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping public health endpoint
        run: curl -fsS --max-time 20 https://arharif.github.io/healthz.json > /dev/null

      - name: Best-effort Supabase ping
        if: ${{ secrets.VITE_SUPABASE_URL != '' && secrets.VITE_SUPABASE_ANON_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          curl -fsS --max-time 20 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/topics?select=id&limit=1" > /dev/null || true
